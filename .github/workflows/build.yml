name: Build Theos Library

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install make perl git

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Clean
        run: make clean

      - name: Build
        run: make

      - name: Debug - find dylib
        run: |
          echo "Searching for dylib..."
          find . -name "*.dylib"

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: MostashUltra-dylib
          path: |
            .theos/obj/**/*.dylib
            .theos/obj/*.dylib
            **/*.dylib
