name: Build Theos Dylib

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install make perl git

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install ldid
        run: |
          curl -L -o ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macos
          chmod +x ldid
          sudo mv ldid /usr/local/bin/ldid

      - name: Clean
        run: make clean

      - name: Build
        run: |
          export LD_SHARED_CACHE_ELIGIBLE=NO
          make

      - name: Show output
        run: |
          find . -name "*.dylib"

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: MostashUltra-dylib
          path: |
            .theos/obj/**/*.dylib
            .theos/obj/debug/**/*.dylib
            **/*.dylib
